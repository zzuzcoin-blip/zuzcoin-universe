<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZUZ Universe — Вступление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .intro-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .skip-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2;
            background: rgba(212, 175, 55, 0.9);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .skip-btn:hover {
            background: #D4AF37;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .loading {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 2;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .logo-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            opacity: 0;
            animation: fadeInOut 2s ease-in-out forwards;
            pointer-events: none;
        }
        .logo-overlay .coin {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: #000;
            margin: 0 auto 20px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
        }
        .logo-overlay h1 {
            color: #D4AF37;
            font-size: 28px;
            letter-spacing: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
        }
        @media (max-width: 768px) {
            .skip-btn { bottom: 16px; right: 16px; padding: 8px 16px; font-size: 12px; }
            .loading { bottom: 16px; left: 16px; font-size: 10px; }
            .logo-overlay .coin { width: 60px; height: 60px; font-size: 36px; }
            .logo-overlay h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <video id="introVideo" class="intro-video" autoplay muted playsinline preload="auto">
        <source src="zzuz.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>
    
    <div class="logo-overlay">
        <div class="coin">Z</div>
        <h1>ZUZ UNIVERSE</h1>
    </div>
    
    <button class="skip-btn" onclick="skipIntro()">Пропустить ⏭️</button>
    <div class="loading">🎬 Погружение в мир 7 мудрецов...</div>

    <script>
        const video = document.getElementById('introVideo');
        let redirected = false;
        
        function goToMain() {
            if (redirected) return;
            redirected = true;
            window.location.href = '/main.html';
        }
        
        // Когда видео закончилось — переходим
        video.addEventListener('ended', goToMain);
        
        // Функция пропуска
        window.skipIntro = function() {
            goToMain();
        };
        
        // Если видео не может загрузиться — переходим через 8 секунд
        setTimeout(() => {
            if (video.readyState === 0 || video.networkState === video.NETWORK_NO_SOURCE) {
                console.log('Видео не загрузилось, переходим');
                goToMain();
            }
        }, 8000);
        
        // Дополнительная проверка: если видео загрузилось, но не играет
        setTimeout(() => {
            if (video.paused && !redirected && video.currentTime === 0) {
                console.log('Видео не играет, переходим');
                goToMain();
            }
        }, 3000);
        
        // Предзагрузка основного сайта в фоне
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = '/main.html';
        document.head.appendChild(link);
    </script>
</body>
</html>
